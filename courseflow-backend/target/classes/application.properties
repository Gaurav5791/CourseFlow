# CourseFlow Backend Configuration
# Spring Boot 3.x Application Properties

# Application Info
spring.application.name=courseflow
server.port=8080

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/courseflow_db
spring.datasource.username=postgres
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool (HikariCP - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Logging Configuration
logging.level.root=INFO
logging.level.com.courseflow=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/courseflow.log

# Jackson JSON Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# CORS Configuration (for frontend integration)
# Adjust origins based on your frontend URL
courseflow.cors.allowed-origins=http://localhost:3000,http://localhost:8081

# Security Configuration (passwords)
# WARNING: Change these in production!
courseflow.security.jwt.secret=your-256-bit-secret-key-change-this-in-production
courseflow.security.jwt.expiration=86400000
# 24 hours in milliseconds

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration (for notifications)
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Application-Specific Configuration
courseflow.enrollment.max-credits-per-semester=18
courseflow.enrollment.registration-open=true
courseflow.enrollment.waitlist-enabled=true
courseflow.enrollment.drop-deadline-days=14

# AI Recommendation Configuration
courseflow.ai.recommendation.enabled=true
courseflow.ai.recommendation.min-similarity=0.5
courseflow.ai.recommendation.max-results=10
courseflow.ai.recommendation.min-common-courses=2

# Actuator Configuration (for monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
info.app.name=CourseFlow
info.app.description=Streamlined Course Registration System
info.app.version=1.0.0