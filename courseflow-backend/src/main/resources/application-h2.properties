# CourseFlow Backend Configuration - H2 Profile
# Spring Boot 3.x Application Properties for H2 development

# Application Info
spring.application.name=courseflow
server.port=8080

# H2 Database Configuration (Embedded)
spring.datasource.url=jdbc:h2:mem:courseflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration for H2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# H2 Console (web UI for database inspection)
spring.h2.console.enabled=true

# PostgreSQL Configuration (uncomment for production/database switching)
#spring.datasource.url=jdbc:postgresql://localhost:5432/courseflow_db
#spring.datasource.username=postgres
#spring.datasource.password=password
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Logging
logging.level.root=INFO
logging.level.com.courseflow=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/courseflow.log

# Jackson JSON
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# CORS
courseflow.cors.allowed-origins=http://localhost:3000,http://localhost:8081

# Security
courseflow.security.jwt.secret=your-256-bit-secret-key-change-this-in-production
courseflow.security.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App Config
courseflow.enrollment.max-credits-per-semester=18
courseflow.enrollment.registration-open=true
courseflow.enrollment.waitlist-enabled=true
courseflow.enrollment.drop-deadline-days=14

# AI
courseflow.ai.recommendation.enabled=true
courseflow.ai.recommendation.min-similarity=0.5
courseflow.ai.recommendation.max-results=10
courseflow.ai.recommendation.min-common-courses=2

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
info.app.name=CourseFlow
info.app.description=Streamlined Course Registration System
info.app.version=1.0.0
